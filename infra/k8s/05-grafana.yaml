# Grafana Deployment + Service + provisioning ConfigMaps.
#
# By default Grafana is reachable only via `kubectl port-forward
# svc/pico-grafana 3000:3000 -n pico`. To expose it publicly,
# uncomment the Ingress + ManagedCertificate at the bottom and substitute
# your hostname.
#
# Admin credentials come from `pico-monitoring-secrets` (set via
# secrets-bootstrap.sh --bootstrap-monitoring).

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pico-grafana
  namespace: pico
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pico-grafana-datasources
  namespace: pico
data:
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        uid: prometheus
        url: http://pico-prometheus.pico.svc:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pico-grafana-dashboards-provider
  namespace: pico
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: pico
        orgId: 1
        folder: pico
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pico-grafana-dashboards
  namespace: pico
data:
  hub-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Channels open",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "pico_hub_channels_total", "refId": "A", "legendFormat": "channels"}
          ],
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 7}
        },
        {
          "id": 2,
          "type": "gauge",
          "title": "HTLCs in flight",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "pico_hub_htlcs_in_flight", "refId": "A"}
          ],
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 7}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Disputes observed (cumulative)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "pico_hub_disputes_total", "refId": "A"}
          ],
          "options": {"reduceOptions": {"calcs": ["last"], "fields": "", "values": false}, "colorMode": "background"},
          "gridPos": {"x": 18, "y": 0, "w": 6, "h": 7}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Liquidity (USDC, smallest unit)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "pico_hub_inbound_liquidity_usdc", "refId": "A", "legendFormat": "inbound"},
            {"expr": "pico_hub_outbound_liquidity_usdc", "refId": "B", "legendFormat": "outbound"}
          ],
          "fieldConfig": {"defaults": {"custom": {"stacking": {"mode": "normal"}, "fillOpacity": 30}}},
          "gridPos": {"x": 0, "y": 7, "w": 12, "h": 8}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Payments by result (rate 5m)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "rate(pico_hub_payments_total[5m])", "refId": "A", "legendFormat": "{{result}}"}
          ],
          "gridPos": {"x": 12, "y": 7, "w": 12, "h": 8}
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Process resident memory",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {"expr": "process_resident_memory_bytes{job=\"pico-hub\"}", "refId": "A", "legendFormat": "rss"}
          ],
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "gridPos": {"x": 0, "y": 15, "w": 24, "h": 7}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["pico", "hub"],
      "time": {"from": "now-6h", "to": "now"},
      "title": "Pico — Hub Overview",
      "uid": "pico-hub-overview",
      "version": 1
    }
  watchtower-overview.json: |
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Channels watched",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "pico_watchtower_channels_watched", "refId": "A"}],
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 6}
        },
        {
          "id": 2,
          "type": "stat",
          "title": "RPC up",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "pico_watchtower_rpc_up", "refId": "A"}],
          "options": {"reduceOptions": {"calcs": ["last"], "fields": "", "values": false}, "colorMode": "background"},
          "fieldConfig": {
            "defaults": {
              "mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}]
            }
          },
          "gridPos": {"x": 6, "y": 0, "w": 6, "h": 6}
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Penalties submitted (cumulative)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "pico_watchtower_penalties_submitted_total", "refId": "A"}],
          "gridPos": {"x": 12, "y": 0, "w": 6, "h": 6}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Evaluations by result (rate 5m)",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "rate(pico_watchtower_evaluations_total[5m])", "refId": "A", "legendFormat": "{{result}}"}],
          "gridPos": {"x": 0, "y": 6, "w": 18, "h": 8}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Process resident memory",
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "process_resident_memory_bytes{job=\"pico-watchtower\"}", "refId": "A", "legendFormat": "rss"}],
          "fieldConfig": {"defaults": {"unit": "bytes"}},
          "gridPos": {"x": 0, "y": 14, "w": 18, "h": 7}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["pico", "watchtower"],
      "time": {"from": "now-6h", "to": "now"},
      "title": "Pico — Watchtower Overview",
      "uid": "pico-watchtower-overview",
      "version": 1
    }
---
apiVersion: v1
kind: Service
metadata:
  name: pico-grafana
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-grafana
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pico-grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pico-grafana
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-grafana
spec:
  serviceName: pico-grafana
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pico-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pico-grafana
    spec:
      serviceAccountName: pico-grafana
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:10.4.5
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: pico-monitoring-secrets
                  key: GRAFANA_ADMIN_USER
                  optional: false
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pico-monitoring-secrets
                  key: GRAFANA_ADMIN_PASSWORD
                  optional: false
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: state
              mountPath: /var/lib/grafana
      volumes:
        - name: datasources
          configMap:
            name: pico-grafana-datasources
        - name: dashboards-provider
          configMap:
            name: pico-grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: pico-grafana-dashboards
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: pico-retain-pd-balanced
        resources:
          requests:
            storage: 5Gi
