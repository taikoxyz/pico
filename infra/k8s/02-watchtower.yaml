# Watchtower StatefulSet (app + litestream sidecar) and headless Service.
# No public surface. The watchtower binds its HTTP server to :: for in-cluster
# metrics scraping; access health locally via kubectl port-forward.
#
# Required Secret: `pico-watchtower-secrets` (set via secrets-bootstrap.sh).

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pico-watchtower
  namespace: pico
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pico-watchtower-config
  namespace: pico
data:
  PORT: "3031"
  LOG_LEVEL: "info"
  DB_URL: "/data/watchtower.sqlite"
  CHAIN_ID: "167000"
  MODE: "self-hosted"
  NODE_ENV: "production"
  METRICS_BIND_ADDR: "::"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pico-watchtower-litestream
  namespace: pico
data:
  litestream.yml: |
    dbs:
      - path: /data/watchtower.sqlite
        replicas:
          - type: s3
            bucket: ${LITESTREAM_R2_BUCKET}
            path: watchtower.sqlite
            endpoint: ${LITESTREAM_R2_ENDPOINT}
            region: ${LITESTREAM_R2_REGION:-auto}
            access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
            secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}
            retention: 720h
            snapshot-interval: 1h
            sync-interval: 10s
---
apiVersion: v1
kind: Service
metadata:
  name: pico-watchtower
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-watchtower
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: pico-watchtower
  ports:
    - name: http
      port: 3031
      targetPort: 3031
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pico-watchtower
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-watchtower
    app.kubernetes.io/version: RELEASE_TAG
spec:
  serviceName: pico-watchtower
  # single-replica; topology spread N/A. PDB ensures availability across
  # node upgrades. RTO single-zone: ~5 min restore from PVC + litestream.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pico-watchtower
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pico-watchtower
        app.kubernetes.io/version: RELEASE_TAG
    spec:
      serviceAccountName: pico-watchtower
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # 90s gives preStop sleep 15 + graceful in-flight evaluation headroom.
      terminationGracePeriodSeconds: 90
      containers:
        - name: watchtower
          image: REGION-docker.pkg.dev/PROJECT/pico/watchtower:VERSION
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 3031
          envFrom:
            - configMapRef:
                name: pico-watchtower-config
            # Kept for compatibility. Once the watchtower app reads from
            # PICO_SECRETS_DIR (see /etc/pico/secrets/ mount below), remove
            # this envFrom block in a follow-on PR.
            - secretRef:
                name: pico-watchtower-secrets
          env:
            # TODO(watchtower-app): implement env-fallback shim that reads
            # files from PICO_SECRETS_DIR before falling back to process.env.
            - name: PICO_SECRETS_DIR
              value: /etc/pico/secrets
          startupProbe:
            httpGet:
              path: /health
              port: 3031
            failureThreshold: 30
            periodSeconds: 10
          # Keep exec probes on localhost so health checks do not depend on
          # Kubernetes Service routing.
          readinessProbe:
            exec:
              command: ["wget", "-qO-", "--timeout=5", "http://127.0.0.1:3031/health"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            exec:
              command: ["wget", "-qO-", "--timeout=5", "http://127.0.0.1:3031/health"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Sleep before SIGTERM to let any in-flight evaluations finish
                # and metrics scrapers see the final counter values.
                command: ["/bin/sh", "-c", "sleep 15"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 1Gi
            # CPU limit intentionally unset to allow event-loop burst on
            # block-tip catch-up. memory limit == request so OOM kills are
            # deterministic.
            limits:
              memory: 512Mi
              ephemeral-storage: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: app-cache
              mountPath: /app/.cache
            - name: watchtower-secrets
              mountPath: /etc/pico/secrets
              readOnly: true
        - name: litestream
          image: litestream/litestream:0.3.13
          args: ["replicate", "-config", "/etc/litestream.yml"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          envFrom:
            - secretRef:
                name: pico-watchtower-secrets
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 256Mi
            limits:
              memory: 128Mi
              ephemeral-storage: 256Mi
          volumeMounts:
            # Litestream needs RW on the SQLite file because it writes a
            # _litestream_seq table to track replication sequence. ReadOnly
            # mounts make replication fail with "attempt to write a readonly
            # database" every second.
            - name: data
              mountPath: /data
            - name: litestream-config
              mountPath: /etc/litestream.yml
              subPath: litestream.yml
              readOnly: true
            - name: litestream-tmp
              mountPath: /tmp
      volumes:
        - name: litestream-config
          configMap:
            name: pico-watchtower-litestream
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: app-cache
          emptyDir:
            sizeLimit: 128Mi
        - name: litestream-tmp
          emptyDir:
            sizeLimit: 32Mi
        - name: watchtower-secrets
          secret:
            secretName: pico-watchtower-secrets
            defaultMode: 0400
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: pico-retain-pd-balanced
        resources:
          requests:
            storage: 2Gi
