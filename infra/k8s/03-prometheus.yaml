# Prometheus StatefulSet (TSDB on a 20Gi PVC, 15-day retention) plus a
# ClusterIP service for Grafana + Alertmanager wiring. Scrape config
# targets the headless Services for hub + watchtower so the pod IPs
# resolve via SRV records.
#
# Hub + watchtower set METRICS_BIND_ADDR=:: so in-cluster Prometheus can reach
# their metrics listeners. Watchtower exposes metrics on its HTTP port, 3031.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pico-prometheus
  namespace: pico
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pico-prometheus-config
  namespace: pico
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      scrape_timeout: 10s
      evaluation_interval: 15s
      external_labels:
        cluster: prod-gke

    rule_files:
      - /etc/prometheus/alerts.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - pico-alertmanager.pico.svc:9093

    scrape_configs:
      - job_name: pico-hub
        metrics_path: /metrics
        static_configs:
          - targets:
              - pico-hub-0.pico-hub.pico.svc:9090

      - job_name: pico-watchtower
        metrics_path: /metrics
        static_configs:
          - targets:
              - pico-watchtower-0.pico-watchtower.pico.svc:3031

      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      # kube-state-metrics: pod / container / deployment / pvc state.
      # Required by PvcAlmostFull and PodRestartLoop alerts.
      - job_name: kube-state-metrics
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_label_app_kubernetes_io_name]
            action: keep
            regex: kube-state-metrics
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            action: keep
            regex: http-metrics

      # kubelet cAdvisor + probes: container CPU/memory + PVC stats.
      # Required by PvcAlmostFull (kubelet_volume_stats_*).
      - job_name: kubelet-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      - job_name: kubelet-probes
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/probes

  alerts.yml: |
    groups:
      - name: pico-protocol
        rules:
          - alert: HubDown
            expr: up{job="pico-hub"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Hub is unreachable"
              description: "Prometheus has been unable to scrape pico-hub for 2m."

          - alert: WatchtowerDown
            expr: up{job="pico-watchtower"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Watchtower is unreachable"
              description: "Prometheus has been unable to scrape pico-watchtower for 2m."

          - alert: WatchtowerRpcDown
            expr: pico_watchtower_rpc_up == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Watchtower RPC connection is down"
              description: "Watchtower cannot reach the configured RPC for 5m. Penalty submission is blocked."

          - alert: DisputeOpened
            expr: increase(pico_hub_disputes_total[5m]) > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Dispute observed by hub"
              description: "pico_hub_disputes_total increased in the last 5m. Open docs/runbooks/dispute-response.md."

          - alert: PenaltySubmissionStalled
            expr: |
              rate(pico_watchtower_evaluations_total{result="penalize"}[1h]) > 0
              and
              rate(pico_watchtower_penalties_submitted_total[1h]) == 0
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Watchtower decided to penalize but no penalty tx landed"
              description: "Penalize-decisions rate > 0 over the last hour while penalty submission rate == 0. Open docs/runbooks/watchtower-down.md."

          - alert: PaymentFailureRateHigh
            expr: |
              rate(pico_hub_payments_total{result="failed"}[15m])
              / clamp_min(rate(pico_hub_payments_total[15m]), 0.001) > 0.1
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Hub payment failure rate above 10%"
              description: "Sustained failure share above 10% for 15m. Check hub logs and watchtower status."

          - alert: HubLiquidityLow
            expr: pico_hub_outbound_liquidity_usdc < 100e6
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Hub outbound liquidity is low"
              description: "Outbound liquidity has been < 100 USDC for 10m. Top up before payments start failing."

          - alert: HubMemoryHigh
            expr: process_resident_memory_bytes{job="pico-hub"} > 524288000
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Hub resident memory above 500MB"
              description: "Investigate for leaks or restart from kubectl."

          - alert: WatchtowerEvaluationStalled
            expr: |
              pico_watchtower_channels_watched > 0
              and
              rate(pico_watchtower_evaluations_total[15m]) == 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "Watchtower has channels but is not evaluating"
              description: "channels_watched > 0 yet evaluations rate == 0 for 15m. Check scheduler + chain watcher logs."

          # === Hot-wallet gas & operational gauges (PR #127 K-01/K-02) ===

          - alert: HubHotWalletGasLow
            expr: pico_hub_hot_wallet_eth_balance_wei < 5e16
            for: 5m
            labels:
              severity: critical
              team: hub
            annotations:
              summary: "Hub hot wallet ETH balance below 0.05"
              description: "{{ $labels.address }} has {{ $value | humanize }} wei"

          - alert: WatchtowerHotWalletGasLow
            expr: pico_watchtower_hot_wallet_eth_balance_wei < 5e16
            for: 5m
            labels:
              severity: critical
              team: watchtower
            annotations:
              summary: "Watchtower hot wallet ETH balance below 0.05"
              description: "{{ $labels.address }} has {{ $value | humanize }} wei. Penalty txs will start failing."

          - alert: ChainWatcherLagging
            expr: pico_hub_chain_watcher_lag_blocks > 50
            for: 5m
            labels:
              severity: high
              team: hub
            annotations:
              summary: "Hub chain watcher is lagging the chain head"
              description: "Lag exceeds 50 blocks for 5m. Dispute / topup events may be delayed."

          - alert: WatchtowerOldestPendingTxStale
            expr: pico_watchtower_oldest_pending_tx_age_ms > 300000
            for: 5m
            labels:
              severity: high
              team: watchtower
            annotations:
              summary: "Watchtower has a pending penalty tx older than 5m"
              description: "Oldest in-flight penalty tx age: {{ $value | humanizeDuration }}"

          - alert: WatchtowerSubmissionFailures
            expr: rate(pico_watchtower_submission_failed_total[5m]) > 0.05
            for: 5m
            labels:
              severity: high
              team: watchtower
            annotations:
              summary: "Watchtower penalty submission failure rate elevated"
              description: "Submission failure rate > 0.05/s over 5m. Check responder logs."

          - alert: PvcAlmostFull
            expr: kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.15
            for: 10m
            labels:
              severity: high
              team: infra
            annotations:
              summary: "PersistentVolume is < 15% available"
              description: "PVC {{ $labels.persistentvolumeclaim }} in {{ $labels.namespace }} is almost full."

          - alert: PodRestartLoop
            expr: rate(kube_pod_container_status_restarts_total[15m]) > 0.1
            for: 10m
            labels:
              severity: high
              team: infra
            annotations:
              summary: "Pod restarting too frequently"
              description: "{{ $labels.namespace }}/{{ $labels.pod }} container {{ $labels.container }} is in a restart loop."

          - alert: HubChannelOpenStalled
            expr: rate(pico_hub_payments_total{result="failed"}[10m]) > 0.1
            for: 5m
            labels:
              severity: medium
              team: hub
            annotations:
              summary: "Hub payment-failure rate elevated"
              description: "Failed payments > 0.1/s over 10m. Channels may be stuck opening or routing."
---
apiVersion: v1
kind: Service
metadata:
  name: pico-prometheus
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-prometheus
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pico-prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pico-prometheus
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-prometheus
spec:
  serviceName: pico-prometheus
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pico-prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pico-prometheus
    spec:
      serviceAccountName: pico-prometheus
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
              ephemeral-storage: 1Gi
            limits:
              memory: 1Gi
              ephemeral-storage: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: pico-prometheus-config
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: pico-retain-pd-balanced
        resources:
          requests:
            storage: 5Gi
