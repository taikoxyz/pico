# Namespace for all pico workloads on GKE Autopilot.
#
# Apply: kubectl apply -f infra/k8s/00-namespace.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: pico
  labels:
    app.kubernetes.io/name: pico
    app.kubernetes.io/managed-by: kubectl
---
# Default LimitRange so any pod that forgets requests gets sane defaults.
# Autopilot rejects pods without requests; this is a safety net for ad-hoc
# kubectl runs (e.g., a debug pod). All shipped manifests set requests
# explicitly.
apiVersion: v1
kind: LimitRange
metadata:
  name: defaults
  namespace: pico
spec:
  limits:
    - type: Container
      default:
        cpu: 250m
        memory: 512Mi
        ephemeral-storage: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
        ephemeral-storage: 1Gi
---
# pd-balanced StorageClass with Retain reclaim policy. Cluster-scoped, so
# applying it during namespace bootstrap is safe and idempotent. Used by
# pico-hub, pico-watchtower, and pico-prometheus for their data PVCs so
# the underlying GCE Persistent Disks survive PVC deletion (which can
# happen on namespace teardown or accidental kubectl delete pvc). Live
# data is also continuously replicated by litestream to Cloudflare R2.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: pico-retain-pd-balanced
provisioner: pd.csi.storage.gke.io
parameters:
  type: pd-balanced
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
