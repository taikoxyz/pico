# Alertmanager Deployment + Service. State is ephemeral so no PVC.
# Webhook URLs are read from `pico-monitoring-secrets` at notify time via
# Alertmanager's `url_file` directive. The Secret is created by
# secrets-bootstrap.sh --bootstrap-monitoring and mounted read-only at
# /etc/alertmanager/secrets. No templating step is required at apply time.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: pico-alertmanager
  namespace: pico
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pico-alertmanager-config
  namespace: pico
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers: [severity="critical"]
          receiver: pager
          group_wait: 10s
          repeat_interval: 1h
        - matchers: [severity="warning"]
          receiver: triage
          repeat_interval: 6h

    receivers:
      - name: default
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/ALERTMANAGER_DEFAULT_WEBHOOK_URL
            send_resolved: true

      - name: pager
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/ALERTMANAGER_PAGER_WEBHOOK_URL
            send_resolved: true

      - name: triage
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/ALERTMANAGER_TRIAGE_WEBHOOK_URL
            send_resolved: true

    inhibit_rules:
      - source_matchers: [severity="critical"]
        target_matchers: [severity="warning"]
        equal: [alertname, cluster]
---
apiVersion: v1
kind: Service
metadata:
  name: pico-alertmanager
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-alertmanager
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: pico-alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pico-alertmanager
  namespace: pico
  labels:
    app.kubernetes.io/name: pico-alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pico-alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pico-alertmanager
    spec:
      serviceAccountName: pico-alertmanager
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.32.1
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 9093
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              memory: 256Mi
              ephemeral-storage: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: webhook-secrets
              mountPath: /etc/alertmanager/secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: pico-alertmanager-config
        - name: webhook-secrets
          secret:
            secretName: pico-monitoring-secrets
            defaultMode: 0400
            items:
              - key: ALERTMANAGER_DEFAULT_WEBHOOK_URL
                path: ALERTMANAGER_DEFAULT_WEBHOOK_URL
              - key: ALERTMANAGER_PAGER_WEBHOOK_URL
                path: ALERTMANAGER_PAGER_WEBHOOK_URL
              - key: ALERTMANAGER_TRIAGE_WEBHOOK_URL
                path: ALERTMANAGER_TRIAGE_WEBHOOK_URL
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
