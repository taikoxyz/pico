# Alertmanager Deployment + Service. State is ephemeral so no PVC.
# Webhook URLs are placeholders; substitute via `tainnel-monitoring-secrets`
# (created by secrets-bootstrap.sh --bootstrap-monitoring) and a small
# templating step before applying.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: tainnel-alertmanager
  namespace: tainnel
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tainnel-alertmanager-config
  namespace: tainnel
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers: [severity="critical"]
          receiver: pager
          group_wait: 10s
          repeat_interval: 1h
        - matchers: [severity="warning"]
          receiver: email
          repeat_interval: 6h

    receivers:
      - name: default
        webhook_configs:
          - url: http://localhost:5001/null  # set ALERTMANAGER_DEFAULT_WEBHOOK_URL
            send_resolved: true

      - name: pager
        webhook_configs:
          - url: http://localhost:5001/pager  # set ALERTMANAGER_PAGER_WEBHOOK_URL
            send_resolved: true

      - name: email
        webhook_configs:
          - url: http://localhost:5001/email  # set ALERTMANAGER_EMAIL_WEBHOOK_URL
            send_resolved: true

    inhibit_rules:
      - source_matchers: [severity="critical"]
        target_matchers: [severity="warning"]
        equal: [alertname, cluster]
---
apiVersion: v1
kind: Service
metadata:
  name: tainnel-alertmanager
  namespace: tainnel
  labels:
    app.kubernetes.io/name: tainnel-alertmanager
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tainnel-alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tainnel-alertmanager
  namespace: tainnel
  labels:
    app.kubernetes.io/name: tainnel-alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tainnel-alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tainnel-alertmanager
    spec:
      serviceAccountName: tainnel-alertmanager
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - name: http
              containerPort: 9093
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: tainnel-alertmanager-config
        - name: data
          emptyDir: {}
