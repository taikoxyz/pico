# Fly.io production manifest for the Pico watchtower.
#
# Single instance in lhr (different region from the hub for fault isolation).
# App + litestream are defined as Fly processes. Watchtower has NO public Fly
# service. Operators reach the running process via
# `flyctl ssh console --app pico-watchtower-prod`.
#
# Deploy from the repo root:
#   flyctl deploy --remote-only --config infra/fly/watchtower/fly.toml

app            = "pico-watchtower-prod"
primary_region = "lhr"

[build]
  dockerfile = "apps/watchtower/Dockerfile"
  [build.args]
    INCLUDE_LITESTREAM = "1"

# All secrets (WATCHTOWER_PRIVATE_KEY, RPC_URL, LITESTREAM_*) are set via
# infra/fly/secrets-bootstrap.sh.
[env]
  LOG_LEVEL  = "info"
  DB_URL     = "/data/watchtower.sqlite"
  CHAIN_ID   = "167000"
  MODE       = "self-hosted"
  NODE_ENV   = "production"

[[mounts]]
  source       = "watchtower_data"
  destination  = "/data"
  initial_size = "5gb"

# Inject the litestream config at deploy time so secrets stay out of the image.
[[files]]
  guest_path = "/etc/litestream.yml"
  local_path = "infra/fly/watchtower/litestream.yml"

[processes]
  app        = "node dist/index.js"
  litestream = "litestream replicate -config /etc/litestream.yml"

# Process-level TCP check: machine-internal probe that the HTTP server is alive.
# Public services are deliberately omitted.
[checks]
  [checks.alive]
    type     = "tcp"
    interval = "30s"
    timeout  = "5s"
    grace_period = "20s"
    port     = 3031

[deploy]
  strategy             = "rolling"
  max_unavailable      = 1
  release_command      = "sh -c 'case \"$FLY_APP_NAME\" in *prod*) exit 0 ;; *) echo \"FLY_APP_NAME must contain prod (got $FLY_APP_NAME)\" >&2; exit 1 ;; esac'"

[[vm]]
  size      = "shared-cpu-1x"
  memory_mb = 512
  cpus      = 1

[machines]
  auto_stop_machines    = false
  auto_start_machines   = false
  min_machines_running  = 1
