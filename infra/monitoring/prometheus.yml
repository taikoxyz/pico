global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: prod

rule_files:
  - alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: pico-hub
    metrics_path: /metrics
    static_configs:
      - targets:
          # Replace with your real metrics target. On Fly the canonical
          # name is pico-hub-prod.internal:9090, BUT the hub currently
          # binds /metrics to 127.0.0.1 inside the machine — see README.
          - pico-hub-prod.internal:9090

  - job_name: pico-watchtower
    metrics_path: /metrics
    static_configs:
      - targets:
          - pico-watchtower-prod.internal:9090

# Uncomment + populate to forward to Grafana Cloud or Grafana Mimir.
