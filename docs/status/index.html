<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pico Status</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        padding: 48px 20px;
        background: Canvas;
        color: CanvasText;
      }
      main {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        font-size: 28px;
        margin: 0 0 8px;
      }
      p {
        line-height: 1.55;
      }
      .status {
        margin-top: 28px;
        border: 1px solid color-mix(in srgb, CanvasText 20%, transparent);
        border-radius: 8px;
        padding: 18px;
      }
      .label {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: color-mix(in srgb, CanvasText 64%, transparent);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="label">Pico Status</p>
      <h1>Pre-GA staging</h1>
      <p>
        This static status page is a launch placeholder. Publish live service status only after
        the real-USDC mainnet smoke test passes and the launch log is complete.
      </p>
      <section class="status">
        <p class="label">Current state</p>
        <p>Production readiness gates are still in progress. Do not treat this page as an uptime SLA.</p>
      </section>
    </main>
  </body>
</html>
