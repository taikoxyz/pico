[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
remappings_path = "remappings.txt"
solc = "0.8.26"
# Taiko mainnet is on the Shanghai EVM; pinning here prevents solc 0.8.26
# from emitting Cancun-only opcodes (MCOPY, TLOAD, TSTORE) that would trap
# as INVALID on-chain.
evm_version = "shanghai"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [
    { access = "read", path = "./" },
    { access = "read", path = "../state-machine/test/fixtures/" },
]

[profile.ci]
fuzz = { runs = 1000 }
verbosity = 3

[profile.nightly]
fuzz = { runs = 100000 }
invariant = { runs = 10000, depth = 500 }
verbosity = 2

[rpc_endpoints]
taiko_mainnet = "${TAIKO_MAINNET_RPC_URL}"
taiko_hoodi = "${TAIKO_HOODI_RPC_URL}"

[etherscan]
taiko_mainnet = { key = "${TAIKOSCAN_API_KEY}", url = "https://api.taikoscan.io/api" }
taiko_hoodi = { key = "${TAIKOSCAN_API_KEY}", url = "https://api.hoodi.taikoscan.io/api" }
