name: deploy

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to deploy"
        required: true
        type: string
      commit_sha:
        description: "Git SHA targeted by the release tag"
        required: true
        type: string
      hub_image:
        description: "Exact hub image reference to deploy"
        required: true
        type: string
      watchtower_image:
        description: "Exact watchtower image reference to deploy"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (v*)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GAR_IMAGE_PREFIX: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}
  GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
  GKE_LOCATION: ${{ vars.GKE_LOCATION }}
  GKE_NAMESPACE: ${{ vars.GKE_NAMESPACE || 'pico' }}

jobs:
  deploy:
    name: Deploy GKE manifests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    concurrency:
      group: gke-production
      cancel-in-progress: false

    steps:
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.commit_sha || inputs.release_tag }}
          fetch-depth: 0

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=0
          for name in \
            GCP_PROJECT_ID \
            GAR_LOCATION \
            GAR_REPOSITORY \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT \
            GKE_CLUSTER \
            GKE_LOCATION
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub repository variable: ${name}"
              missing=1
            fi
          done

          if [[ ! "$GKE_NAMESPACE" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "::error::GKE_NAMESPACE must be a valid Kubernetes namespace name"
            missing=1
          fi

          exit "$missing"
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Resolve release inputs
        id: release
        run: |
          set -euo pipefail
          release_tag="${{ inputs.release_tag }}"
          input_commit_sha="${{ inputs.commit_sha }}"
          hub_image="${{ inputs.hub_image }}"
          watchtower_image="${{ inputs.watchtower_image }}"

          if [[ ! "$release_tag" =~ ^v ]]; then
            echo "::error::Release tag must start with v: $release_tag"
            exit 1
          fi

          tag_commit_sha="$(git rev-list -n1 "$release_tag")"
          if [[ -n "$input_commit_sha" && "$input_commit_sha" != "$tag_commit_sha" ]]; then
            echo "::error::Release tag $release_tag points at $tag_commit_sha, not $input_commit_sha"
            exit 1
          fi

          commit_sha="${input_commit_sha:-$tag_commit_sha}"
          hub_image="${hub_image:-${GAR_IMAGE_PREFIX}/hub:${release_tag}}"
          watchtower_image="${watchtower_image:-${GAR_IMAGE_PREFIX}/watchtower:${release_tag}}"

          {
            echo "release_tag=${release_tag}"
            echo "commit_sha=${commit_sha}"
            echo "hub_image=${hub_image}"
            echo "watchtower_image=${watchtower_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Resolve image digests
        id: images
        run: |
          set -euo pipefail
          resolve_digest_ref() {
            local ref="$1"
            if [[ "$ref" == *@sha256:* ]]; then
              echo "$ref"
              return
            fi
            local repo="${ref%%:*}"
            local digest
            digest="$(gcloud artifacts docker images describe "$ref" \
              --project "$GCP_PROJECT_ID" \
              --format='value(image_summary.digest)')"
            if [[ -z "$digest" ]]; then
              echo "::error::Could not resolve digest for $ref"
              exit 1
            fi
            echo "${repo}@${digest}"
          }

          hub_image="$(resolve_digest_ref "${{ steps.release.outputs.hub_image }}")"
          watchtower_image="$(resolve_digest_ref "${{ steps.release.outputs.watchtower_image }}")"
          {
            echo "hub_image=${hub_image}"
            echo "watchtower_image=${watchtower_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}

      - name: Verify Artifact Registry images exist
        run: |
          set -euo pipefail
          gcloud artifacts docker images describe "${{ steps.images.outputs.hub_image }}" \
            --project "$GCP_PROJECT_ID"
          gcloud artifacts docker images describe "${{ steps.images.outputs.watchtower_image }}" \
            --project "$GCP_PROJECT_ID"

      - name: Render manifests
        run: |
          set -euo pipefail
          infra/k8s/render-manifests.sh \
            --hub-image "${{ steps.images.outputs.hub_image }}" \
            --watchtower-image "${{ steps.images.outputs.watchtower_image }}" \
            --namespace "$GKE_NAMESPACE" \
            --out-dir .context/gke-manifests

      - name: Apply manifests
        run: |
          set -euo pipefail
          # Grafana moved from Deployment to StatefulSet for persistent UI state.
          kubectl delete deployment/pico-grafana -n "$GKE_NAMESPACE" --ignore-not-found
          for manifest in \
            .context/gke-manifests/00-namespace.yaml \
            .context/gke-manifests/01-hub.yaml \
            .context/gke-manifests/02-watchtower.yaml \
            .context/gke-manifests/03-prometheus.yaml \
            .context/gke-manifests/04-alertmanager.yaml \
            .context/gke-manifests/05-grafana.yaml \
            .context/gke-manifests/06-networkpolicy.yaml
          do
            kubectl apply -f "$manifest"
          done

      - name: Verify rollouts
        run: |
          set -euo pipefail
          kubectl rollout status statefulset/pico-hub -n "$GKE_NAMESPACE" --timeout=10m
          kubectl rollout status statefulset/pico-watchtower -n "$GKE_NAMESPACE" --timeout=10m
          kubectl rollout status statefulset/pico-prometheus -n "$GKE_NAMESPACE" --timeout=10m
          kubectl rollout status statefulset/pico-grafana -n "$GKE_NAMESPACE" --timeout=5m
          kubectl rollout status deployment/pico-alertmanager -n "$GKE_NAMESPACE" --timeout=5m

      - name: Verify deployed images
        run: |
          set -euo pipefail
          actual_hub="$(kubectl get statefulset pico-hub -n "$GKE_NAMESPACE" -o jsonpath='{.spec.template.spec.containers[?(@.name=="hub")].image}')"
          actual_watchtower="$(kubectl get statefulset pico-watchtower -n "$GKE_NAMESPACE" -o jsonpath='{.spec.template.spec.containers[?(@.name=="watchtower")].image}')"

          if [[ "$actual_hub" != "${{ steps.images.outputs.hub_image }}" ]]; then
            echo "::error::Hub image mismatch: expected ${{ steps.images.outputs.hub_image }}, got $actual_hub"
            exit 1
          fi

          if [[ "$actual_watchtower" != "${{ steps.images.outputs.watchtower_image }}" ]]; then
            echo "::error::Watchtower image mismatch: expected ${{ steps.images.outputs.watchtower_image }}, got $actual_watchtower"
            exit 1
          fi

      - name: Verify health endpoints
        run: |
          set -euo pipefail
          kubectl exec -n "$GKE_NAMESPACE" statefulset/pico-hub -c hub -- \
            wget -qO- --timeout=5 http://127.0.0.1:3030/v1/health >/dev/null
          kubectl exec -n "$GKE_NAMESPACE" statefulset/pico-watchtower -c watchtower -- \
            wget -qO- --timeout=5 http://127.0.0.1:3031/health >/dev/null

      - name: Deployment summary
        run: |
          {
            echo "## GKE deployment"
            echo "- Release tag: \`${{ steps.release.outputs.release_tag }}\`"
            echo "- Commit SHA: \`${{ steps.release.outputs.commit_sha }}\`"
            echo "- Namespace: \`$GKE_NAMESPACE\`"
            echo "- Hub image: \`${{ steps.images.outputs.hub_image }}\`"
            echo "- Watchtower image: \`${{ steps.images.outputs.watchtower_image }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
