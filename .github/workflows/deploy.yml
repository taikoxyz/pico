name: deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - hub
          - watchtower
      commit_sha:
        description: "Git SHA to deploy (must be tagged v*)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          fetch-depth: 0

      - name: Verify SHA is on a v* tag
        run: |
          set -euo pipefail
          tags="$(git tag --points-at "${{ github.event.inputs.commit_sha }}" | grep -E '^v' || true)"
          if [[ -z "$tags" ]]; then
            echo "::error::Commit ${{ github.event.inputs.commit_sha }} is not on a v* tag. Mainnet deploys require a tagged release."
            exit 1
          fi
          echo "Tag(s) found: $tags"
          # Persist the highest-versioned tag for the image label.
          first_tag="$(echo "$tags" | head -n1)"
          echo "RELEASE_TAG=$first_tag" >> "$GITHUB_ENV"

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          service="${{ github.event.inputs.service }}"
          short_sha="$(echo "${{ github.event.inputs.commit_sha }}" | cut -c1-12)"
          image_label="${RELEASE_TAG}-${short_sha}"
          flyctl deploy \
            --remote-only \
            --config "infra/fly/${service}/fly.toml" \
            --image-label "$image_label"
          echo "## Deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: \`$service\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`$RELEASE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`${{ github.event.inputs.commit_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image label: \`$image_label\`" >> "$GITHUB_STEP_SUMMARY"
