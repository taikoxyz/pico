name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  working-tree:
    if: github.event_name == 'pull_request' || github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan current tree for secrets
        run: bash scripts/scan-secrets.sh tree
