name: secret-scan

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  working-tree:
    if: github.event_name == 'pull_request' || github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan current tree for secrets
        run: bash scripts/scan-secrets.sh tree

  git-history:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan full git history for secrets
        run: bash scripts/scan-secrets.sh history
