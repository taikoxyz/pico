name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish or open version PR
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Tag release for Docker build
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
          DEPLOY_PKGS: '["@inferenceroom/pico-protocol","@inferenceroom/pico-state-machine","@inferenceroom/pico-sdk"]'
        run: |
          set -euo pipefail
          DEPLOY_VERSION=$(echo "$PUBLISHED" | jq -r --argjson pkgs "$DEPLOY_PKGS" \
            'map(select(.name as $n | $pkgs | index($n))) | (.[0].version // "")')
          if [ -z "$DEPLOY_VERSION" ] || [ "$DEPLOY_VERSION" = "null" ]; then
            echo "No deployment-relevant package published; skipping Docker tag."
            exit 0
          fi
          TAG="v${DEPLOY_VERSION}"
          if git rev-parse --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists; skipping."
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
