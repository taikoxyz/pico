name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Version or publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Publish or open version PR
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          LEFTHOOK: '0'

      - name: Tag release for Docker build
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          SDK_VERSION=$(echo "$PUBLISHED" | jq -r '.[] | select(.name=="@inferenceroom/pico-sdk") | .version')
          if [ -z "$SDK_VERSION" ] || [ "$SDK_VERSION" = "null" ]; then
            echo "No fixed-group publish; skipping Docker tag."
            exit 0
          fi
          TAG="v${SDK_VERSION}"
          if git rev-parse --verify --quiet "refs/tags/${TAG}"; then
            echo "Tag ${TAG} already exists; skipping."
            exit 0
          fi
          git tag "${TAG}"
          git push origin "${TAG}"
