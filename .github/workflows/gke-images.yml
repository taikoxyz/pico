name: gke-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write
  security-events: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GAR_REGISTRY: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
  GAR_IMAGE_PREFIX: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}
  GKE_NAMESPACE: ${{ vars.GKE_NAMESPACE || 'pico' }}

jobs:
  build-push:
    name: Build and push GKE images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_tag: ${{ steps.images.outputs.release_tag }}
      commit_sha: ${{ steps.images.outputs.commit_sha }}
      hub_image: ${{ steps.digest.outputs.hub_image }}
      watchtower_image: ${{ steps.digest.outputs.watchtower_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=0
          for name in \
            GCP_PROJECT_ID \
            GAR_LOCATION \
            GAR_REPOSITORY \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT \
            GKE_CLUSTER \
            GKE_LOCATION
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub repository variable: ${name}"
              missing=1
            fi
          done
          exit "$missing"
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          GKE_LOCATION: ${{ vars.GKE_LOCATION }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image references
        id: images
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          commit_sha="$(git rev-list -n1 "$release_tag")"
          hub_tag="${GAR_IMAGE_PREFIX}/hub:${release_tag}"
          watchtower_tag="${GAR_IMAGE_PREFIX}/watchtower:${release_tag}"

          {
            echo "release_tag=${release_tag}"
            echo "commit_sha=${commit_sha}"
            echo "hub_tag=${hub_tag}"
            echo "watchtower_tag=${watchtower_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Guard against tag overwrite
        run: |
          set -euo pipefail
          for img in "${{ steps.images.outputs.hub_tag }}" "${{ steps.images.outputs.watchtower_tag }}"; do
            if gcloud artifacts docker images describe "$img" --project "$GCP_PROJECT_ID" 2>/dev/null; then
              echo "::error::Image $img already exists in Artifact Registry. Delete the tag or cut a new release."
              exit 1
            fi
          done

      - name: Build and push hub
        id: hub_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/hub/Dockerfile
          push: true
          build-args: |
            INCLUDE_LITESTREAM=1
          tags: ${{ steps.images.outputs.hub_tag }}

      - name: Build and push watchtower
        id: watchtower_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/watchtower/Dockerfile
          push: true
          build-args: |
            INCLUDE_LITESTREAM=1
          tags: ${{ steps.images.outputs.watchtower_tag }}

      - name: Compute digest image references
        id: digest
        run: |
          set -euo pipefail
          hub_image="${GAR_IMAGE_PREFIX}/hub@${{ steps.hub_build.outputs.digest }}"
          watchtower_image="${GAR_IMAGE_PREFIX}/watchtower@${{ steps.watchtower_build.outputs.digest }}"
          {
            echo "hub_image=${hub_image}"
            echo "watchtower_image=${watchtower_image}"
          } >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # Image hardening: vulnerability scan, SBOM, and signing.
      # NOTE FOR OPERATORS: cosign signing requires two repository secrets:
      #   COSIGN_PRIVATE_KEY  - cosign key reference. Recommended: a GCP
      #                         KMS-backed key, e.g.
      #                         gcpkms://projects/<proj>/locations/<loc>/keyRings/<ring>/cryptoKeys/<key>/cryptoKeyVersions/<ver>
      #                         (preferred over a raw cosign.key blob).
      #   COSIGN_PASSWORD     - password for the key (empty string when
      #                         using a KMS reference).
      # When either secret is missing, the signing step is skipped so the
      # release is not blocked, but unsigned images will fail Binary
      # Authorization in production. Configure these before relying on
      # signature verification in the GKE admission policy.
      # ---------------------------------------------------------------

      - name: Trivy scan - hub
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.digest.outputs.hub_image }}
          format: sarif
          output: trivy-hub.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy SARIF - hub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-hub.sarif
          category: trivy-hub

      - name: Trivy scan - watchtower
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.digest.outputs.watchtower_image }}
          format: sarif
          output: trivy-watchtower.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"

      - name: Upload Trivy SARIF - watchtower
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-watchtower.sarif
          category: trivy-watchtower

      - name: Generate SBOM - hub
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.digest.outputs.hub_image }}
          format: spdx-json
          output-file: sbom-hub.spdx.json
          upload-artifact: false

      - name: Generate SBOM - watchtower
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.digest.outputs.watchtower_image }}
          format: spdx-json
          output-file: sbom-watchtower.spdx.json
          upload-artifact: false

      - name: Upload SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: sboms-${{ steps.images.outputs.release_tag }}
          path: |
            sbom-hub.spdx.json
            sbom-watchtower.spdx.json
          if-no-files-found: error

      - name: Check cosign signing availability
        id: cosign_gate
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          if [ -n "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "::warning::COSIGN_PRIVATE_KEY secret not set; images were built and scanned but NOT signed. Binary Authorization will reject these images if signature verification is enforced."
          fi

      - name: Install cosign
        if: steps.cosign_gate.outputs.sign == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign images with cosign
        if: steps.cosign_gate.outputs.sign == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          HUB_IMAGE: ${{ steps.digest.outputs.hub_image }}
          WATCHTOWER_IMAGE: ${{ steps.digest.outputs.watchtower_image }}
        run: |
          set -euo pipefail
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$HUB_IMAGE"
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY "$WATCHTOWER_IMAGE"

      - name: Render GKE manifests
        run: |
          set -euo pipefail
          infra/k8s/render-manifests.sh \
            --hub-image "${{ steps.digest.outputs.hub_image }}" \
            --watchtower-image "${{ steps.digest.outputs.watchtower_image }}" \
            --release-tag "${{ steps.images.outputs.release_tag }}" \
            --namespace "$GKE_NAMESPACE" \
            --out-dir .context/gke-manifests

      - name: Upload rendered GKE manifests
        uses: actions/upload-artifact@v4
        with:
          name: gke-manifests-${{ steps.images.outputs.release_tag }}
          path: .context/gke-manifests/
          if-no-files-found: error

  deploy:
    name: Deploy GKE manifests
    needs: build-push
    uses: ./.github/workflows/deploy.yml
    with:
      release_tag: ${{ needs.build-push.outputs.release_tag }}
      commit_sha: ${{ needs.build-push.outputs.commit_sha }}
      hub_image: ${{ needs.build-push.outputs.hub_image }}
      watchtower_image: ${{ needs.build-push.outputs.watchtower_image }}
    secrets: inherit
