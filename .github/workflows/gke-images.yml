name: gke-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GAR_REGISTRY: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
  GAR_IMAGE_PREFIX: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}
  GKE_NAMESPACE: ${{ vars.GKE_NAMESPACE || 'pico' }}

jobs:
  build-push:
    name: Build and push GKE images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      release_tag: ${{ steps.images.outputs.release_tag }}
      commit_sha: ${{ steps.images.outputs.commit_sha }}
      hub_image: ${{ steps.images.outputs.hub_image }}
      watchtower_image: ${{ steps.images.outputs.watchtower_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=0
          for name in \
            GCP_PROJECT_ID \
            GAR_LOCATION \
            GAR_REPOSITORY \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT \
            GKE_CLUSTER \
            GKE_LOCATION
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub repository variable: ${name}"
              missing=1
            fi
          done
          exit "$missing"
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
          GKE_CLUSTER: ${{ vars.GKE_CLUSTER }}
          GKE_LOCATION: ${{ vars.GKE_LOCATION }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image references
        id: images
        run: |
          set -euo pipefail
          release_tag="${GITHUB_REF_NAME}"
          commit_sha="$(git rev-list -n1 "$release_tag")"
          hub_image="${GAR_IMAGE_PREFIX}/hub:${release_tag}"
          watchtower_image="${GAR_IMAGE_PREFIX}/watchtower:${release_tag}"

          {
            echo "release_tag=${release_tag}"
            echo "commit_sha=${commit_sha}"
            echo "hub_image=${hub_image}"
            echo "watchtower_image=${watchtower_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Guard against tag overwrite
        run: |
          set -euo pipefail
          for img in "${{ steps.images.outputs.hub_image }}" "${{ steps.images.outputs.watchtower_image }}"; do
            if gcloud artifacts docker images describe "$img" --project "$GCP_PROJECT_ID" 2>/dev/null; then
              echo "::error::Image $img already exists in Artifact Registry. Delete the tag or cut a new release."
              exit 1
            fi
          done

      - name: Build and push hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/hub/Dockerfile
          push: true
          build-args: |
            INCLUDE_LITESTREAM=1
          tags: ${{ steps.images.outputs.hub_image }}

      - name: Build and push watchtower
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/watchtower/Dockerfile
          push: true
          build-args: |
            INCLUDE_LITESTREAM=1
          tags: ${{ steps.images.outputs.watchtower_image }}

      - name: Render GKE manifests
        run: |
          set -euo pipefail
          infra/k8s/render-manifests.sh \
            --hub-image "${{ steps.images.outputs.hub_image }}" \
            --watchtower-image "${{ steps.images.outputs.watchtower_image }}" \
            --namespace "$GKE_NAMESPACE" \
            --out-dir .context/gke-manifests

      - name: Upload rendered GKE manifests
        uses: actions/upload-artifact@v4
        with:
          name: gke-manifests-${{ steps.images.outputs.release_tag }}
          path: .context/gke-manifests/
          if-no-files-found: error

  deploy:
    name: Deploy GKE manifests
    needs: build-push
    uses: ./.github/workflows/deploy.yml
    with:
      release_tag: ${{ needs.build-push.outputs.release_tag }}
      commit_sha: ${{ needs.build-push.outputs.commit_sha }}
      hub_image: ${{ needs.build-push.outputs.hub_image }}
      watchtower_image: ${{ needs.build-push.outputs.watchtower_image }}
    secrets: inherit
