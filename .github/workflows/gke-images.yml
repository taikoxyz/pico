name: gke-images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
  GAR_REGISTRY: ${{ vars.GAR_LOCATION }}-docker.pkg.dev
  GAR_IMAGE_PREFIX: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GAR_REPOSITORY }}

jobs:
  build-push:
    name: Build and push GKE images
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          set -euo pipefail
          missing=0
          for name in \
            GCP_PROJECT_ID \
            GAR_LOCATION \
            GAR_REPOSITORY \
            GCP_WORKLOAD_IDENTITY_PROVIDER \
            GCP_SERVICE_ACCOUNT
          do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing GitHub repository variable: ${name}"
              missing=1
            fi
          done
          exit "$missing"
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          token_format: access_token
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Login to Artifact Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image references
        id: images
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          release_tag="${GITHUB_REF_NAME}"
          hub_image="${GAR_IMAGE_PREFIX}/hub:${release_tag}-${short_sha}"
          watchtower_image="${GAR_IMAGE_PREFIX}/watchtower:${release_tag}-${short_sha}"

          {
            echo "short_sha=${short_sha}"
            echo "release_tag=${release_tag}"
            echo "hub_image=${hub_image}"
            echo "watchtower_image=${watchtower_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/hub/Dockerfile
          push: true
          build-args: |
            INCLUDE_LITESTREAM=1
          tags: |
            ${{ env.GAR_IMAGE_PREFIX }}/hub:${{ steps.images.outputs.release_tag }}
            ${{ steps.images.outputs.hub_image }}

      - name: Build and push watchtower
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/watchtower/Dockerfile
          push: true
          build-args: |
            INCLUDE_LITESTREAM=1
          tags: |
            ${{ env.GAR_IMAGE_PREFIX }}/watchtower:${{ steps.images.outputs.release_tag }}
            ${{ steps.images.outputs.watchtower_image }}

      - name: Render GKE manifests
        run: |
          set -euo pipefail
          out_dir=".context/gke-manifests"
          rm -rf "$out_dir"
          mkdir -p "$out_dir"

          cp infra/k8s/00-namespace.yaml "$out_dir/00-namespace.yaml"
          sed \
            "s|REGION-docker.pkg.dev/PROJECT/tainnel/hub:VERSION|${{ steps.images.outputs.hub_image }}|g" \
            infra/k8s/01-hub.yaml > "$out_dir/01-hub.yaml"
          sed \
            "s|REGION-docker.pkg.dev/PROJECT/tainnel/watchtower:VERSION|${{ steps.images.outputs.watchtower_image }}|g" \
            infra/k8s/02-watchtower.yaml > "$out_dir/02-watchtower.yaml"
          cp infra/k8s/03-prometheus.yaml "$out_dir/03-prometheus.yaml"
          cp infra/k8s/04-alertmanager.yaml "$out_dir/04-alertmanager.yaml"
          cp infra/k8s/05-grafana.yaml "$out_dir/05-grafana.yaml"

          if grep -R "REGION-docker.pkg.dev/PROJECT/tainnel" "$out_dir"; then
            echo "::error::Rendered manifests still contain image placeholders."
            exit 1
          fi

      - name: Upload rendered GKE manifests
        uses: actions/upload-artifact@v4
        with:
          name: gke-manifests-${{ steps.images.outputs.release_tag }}
          path: .context/gke-manifests/
          if-no-files-found: error
