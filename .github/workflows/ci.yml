name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: 20

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run build --filter='!@tainnel/contracts'

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run test --filter='!@tainnel/contracts'

  test-solidity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.0
      - name: Cache forge libraries
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-lib-${{ runner.os }}-${{ hashFiles('packages/contracts/remappings.txt', 'packages/contracts/foundry.toml', 'packages/contracts/foundry.lock') }}
      - name: Install forge libraries
        run: |
          if [ ! -d lib/forge-std ]; then
            git clone --depth 1 --branch v1.16.0 https://github.com/foundry-rs/forge-std.git lib/forge-std
          fi
          if [ ! -d lib/openzeppelin-contracts ]; then
            git clone --depth 1 --branch v5.4.0 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          fi
          if [ ! -d lib/openzeppelin-contracts-upgradeable ]; then
            git clone --depth 1 --branch v5.4.0 https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable.git lib/openzeppelin-contracts-upgradeable
          fi
      - run: forge fmt --check
      - run: forge build
      - run: forge test -vvv

  ci:
    if: always()
    needs: [lint, typecheck, build, test-ts, test-solidity]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          result="${{ join(needs.*.result, ',') }}"
          echo "Upstream results: $result"
          if [[ "$result" == *"failure"* || "$result" == *"cancelled"* ]]; then
            echo "::error::One or more required jobs did not succeed"
            exit 1
          fi
          echo "All required jobs succeeded"
