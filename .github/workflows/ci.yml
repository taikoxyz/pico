name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.0
  NODE_VERSION: 20

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec turbo run build --filter='!@tainnel/contracts'

  test-ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.0
      - name: Cache forge libraries
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-lib-${{ runner.os }}-${{ hashFiles('packages/contracts/remappings.txt', 'packages/contracts/foundry.toml', 'packages/contracts/foundry.lock') }}
      - name: Install forge libraries
        working-directory: packages/contracts
        run: |
          if [ ! -f lib/forge-std/src/Test.sol ]; then
            rm -rf lib/forge-std
            git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          fi
          if [ ! -f lib/openzeppelin-contracts/contracts/token/ERC20/IERC20.sol ]; then
            rm -rf lib/openzeppelin-contracts
            git clone --depth 1 --branch v5.6.1 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          fi
          if [ ! -f lib/openzeppelin-contracts-upgradeable/contracts/security/ReentrancyGuardUpgradeable.sol ]; then
            rm -rf lib/openzeppelin-contracts-upgradeable
            git clone --depth 1 --branch v4.9.6 https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable.git lib/openzeppelin-contracts-upgradeable
          fi
      - run: pnpm install --frozen-lockfile
      - name: Build contract artifacts
        working-directory: packages/contracts
        run: forge build
      - run: pnpm exec turbo run test --filter='!@tainnel/contracts' --filter='!@tainnel/e2e'

  test-solidity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.0
      - name: Cache forge libraries
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-lib-${{ runner.os }}-${{ hashFiles('packages/contracts/remappings.txt', 'packages/contracts/foundry.toml', 'packages/contracts/foundry.lock') }}
      - name: Install forge libraries
        run: |
          if [ ! -f lib/forge-std/src/Test.sol ]; then
            rm -rf lib/forge-std
            git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          fi
          if [ ! -f lib/openzeppelin-contracts/contracts/token/ERC20/IERC20.sol ]; then
            rm -rf lib/openzeppelin-contracts
            git clone --depth 1 --branch v5.6.1 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          fi
          if [ ! -f lib/openzeppelin-contracts-upgradeable/contracts/security/ReentrancyGuardUpgradeable.sol ]; then
            rm -rf lib/openzeppelin-contracts-upgradeable
            git clone --depth 1 --branch v4.9.6 https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable.git lib/openzeppelin-contracts-upgradeable
          fi
      - run: forge fmt --check
      - run: forge build
      - run: forge test -vvv

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.0
      - name: Cache forge libraries
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-lib-${{ runner.os }}-${{ hashFiles('packages/contracts/remappings.txt', 'packages/contracts/foundry.toml', 'packages/contracts/foundry.lock') }}
      - name: Install forge libraries
        working-directory: packages/contracts
        run: |
          if [ ! -f lib/forge-std/src/Test.sol ]; then
            rm -rf lib/forge-std
            git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          fi
          if [ ! -f lib/openzeppelin-contracts/contracts/token/ERC20/IERC20.sol ]; then
            rm -rf lib/openzeppelin-contracts
            git clone --depth 1 --branch v5.6.1 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          fi
          if [ ! -f lib/openzeppelin-contracts-upgradeable/contracts/security/ReentrancyGuardUpgradeable.sol ]; then
            rm -rf lib/openzeppelin-contracts-upgradeable
            git clone --depth 1 --branch v4.9.6 https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable.git lib/openzeppelin-contracts-upgradeable
          fi
      - run: pnpm install --frozen-lockfile
      - name: Build contract artifacts
        working-directory: packages/contracts
        run: forge build
      - name: Build TS packages
        run: pnpm exec turbo run build --filter='!@tainnel/contracts'
      - name: Run E2E tests
        run: pnpm -F @tainnel/e2e test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Hub coverage
        run: pnpm -F @tainnel/hub test:coverage
      - name: Watchtower coverage
        run: pnpm -F @tainnel/watchtower test:coverage
      - name: CLI coverage
        run: pnpm -F @tainnel/cli test:coverage

  e2e-fork:
    runs-on: ubuntu-latest
    if: ${{ secrets.TAIKO_MAINNET_RPC_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.0
      - run: pnpm install --frozen-lockfile
      - name: Build TS packages
        run: pnpm exec turbo run build --filter='!@tainnel/contracts'
      - name: Run forked E2E tests
        env:
          E2E_FORK_URL: ${{ secrets.TAIKO_MAINNET_RPC_URL }}
        run: pnpm -F @tainnel/e2e test:fork

  ci:
    if: always()
    needs: [lint, typecheck, build, test-ts, test-solidity, e2e, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          result="${{ join(needs.*.result, ',') }}"
          echo "Upstream results: $result"
          if [[ "$result" == *"failure"* || "$result" == *"cancelled"* ]]; then
            echo "::error::One or more required jobs did not succeed"
            exit 1
          fi
          echo "All required jobs succeeded"
