name: forge-nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    defaults:
      run:
        working-directory: packages/contracts
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.0
      - name: Cache forge libraries
        uses: actions/cache@v4
        with:
          path: packages/contracts/lib
          key: forge-lib-${{ runner.os }}-${{ hashFiles('packages/contracts/remappings.txt', 'packages/contracts/foundry.toml', 'packages/contracts/foundry.lock') }}
      - name: Install forge libraries
        run: |
          if [ ! -f lib/forge-std/src/Test.sol ]; then
            rm -rf lib/forge-std
            git clone --depth 1 --branch v1.16.1 https://github.com/foundry-rs/forge-std.git lib/forge-std
          fi
          if [ ! -f lib/openzeppelin-contracts/contracts/token/ERC20/IERC20.sol ]; then
            rm -rf lib/openzeppelin-contracts
            git clone --depth 1 --branch v5.6.1 https://github.com/OpenZeppelin/openzeppelin-contracts.git lib/openzeppelin-contracts
          fi
          if [ ! -f lib/openzeppelin-contracts-upgradeable/contracts/security/ReentrancyGuardUpgradeable.sol ]; then
            rm -rf lib/openzeppelin-contracts-upgradeable
            git clone --depth 1 --branch v4.9.6 https://github.com/OpenZeppelin/openzeppelin-contracts-upgradeable.git lib/openzeppelin-contracts-upgradeable
          fi
      - name: Forge invariant + fuzz at high run count
        env:
          FOUNDRY_PROFILE: nightly
        run: forge test
